name: Check citas

# Public repo → GitHub Actions are unlimited and free. Run every 7 min.
on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: check-citas
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=0 npm install --no-audit --no-fund

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOTIFY: ${{ vars.FORCE_NOTIFY }}
          MAX_MONTHS: "6"
          HEADLESS: "true"
          SAVE_DEBUG: "true"
        run: node check.js

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7
